name: Update Latest Projects

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * *"

permissions:
  contents: write

jobs:
  update-readme-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate latest projects block
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          python scripts/update_latest_projects.py --readme README.md --limit 6

      - name: Commit and push if README changed
        run: |
          if git diff --quiet README.md; then
            echo "README is up-to-date. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): update latest projects"
          git push
